<div class="layout">
  <div class="menu">
    @if (isWorking$ | async) {
      <span>Working...</span>
    } @else {
      <button (click)="download$.next(1)">Download GCODE</button>
      <button (click)="upload$.next(1)">Load</button>
    }
    <app-model-editor
      [model]="model$.value"
      (modelChange)="model$.next($event)"
    />
  </div>

  <app-viewer
    [shapes]="drawShapes$"
    [paths]="drawPaths$"
    [highlightShapes]="(expandedShapes$ | async) ?? []"
  />
</div>
